apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: nexusdeploy

commonLabels:
  environment: production

patches:
  # api-gateway: 3 replicas, higher resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
        namespace: nexusdeploy
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: api-gateway
                resources:
                  requests:
                    cpu: "200m"
                    memory: "256Mi"
                  limits:
                    cpu: "1000m"
                    memory: "1Gi"
  # auth-service: 3 replicas, higher resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
        namespace: nexusdeploy
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: auth-service
                resources:
                  requests:
                    cpu: "200m"
                    memory: "256Mi"
                  limits:
                    cpu: "1000m"
                    memory: "1Gi"
  # worker-service: 3 replicas, higher resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: worker-service
        namespace: nexusdeploy
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: worker-service
                resources:
                  requests:
                    cpu: "500m"
                    memory: "512Mi"
                  limits:
                    cpu: "2000m"
                    memory: "2Gi"
  # HPA: full scaling
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: api-gateway
        namespace: nexusdeploy
      spec:
        minReplicas: 3
        maxReplicas: 10
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: auth-service
        namespace: nexusdeploy
      spec:
        minReplicas: 3
        maxReplicas: 8
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: worker-service
        namespace: nexusdeploy
      spec:
        minReplicas: 3
        maxReplicas: 12

# PodDisruptionBudget for prod
patchesStrategicMerge: []

resources:
  - pdb.yaml

configMapGenerator:
  - name: api-gateway-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
  - name: auth-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
  - name: worker-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
