apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: nexusdeploy-dev

commonLabels:
  environment: dev

patches:
  # api-gateway: 1 replica, lower resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
        namespace: nexusdeploy-dev
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: api-gateway
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "200m"
                    memory: "256Mi"
  # auth-service: 1 replica, lower resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
        namespace: nexusdeploy-dev
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: auth-service
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "200m"
                    memory: "256Mi"
  # worker-service: 1 replica, lower resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: worker-service
        namespace: nexusdeploy-dev
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: worker-service
                resources:
                  requests:
                    cpu: "100m"
                    memory: "128Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
  # HPA: lower min replicas
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: api-gateway
        namespace: nexusdeploy-dev
      spec:
        minReplicas: 1
        maxReplicas: 3
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: auth-service
        namespace: nexusdeploy-dev
      spec:
        minReplicas: 1
        maxReplicas: 3
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: worker-service
        namespace: nexusdeploy-dev
      spec:
        minReplicas: 1
        maxReplicas: 4

configMapGenerator:
  - name: api-gateway-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
  - name: auth-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
  - name: worker-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
