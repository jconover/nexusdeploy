apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-netpol
  namespace: nexusdeploy
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow ingress from within namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexusdeploy
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow egress to auth-service
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 8081
    # Allow egress to worker-service
    - to:
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - protocol: TCP
          port: 8082
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
