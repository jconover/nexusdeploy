apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-service-netpol
  namespace: nexusdeploy
spec:
  podSelector:
    matchLabels:
      app: worker-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow egress to redis
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 6379
    # Allow egress to GCP APIs (HTTPS)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
