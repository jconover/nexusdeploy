apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: nexusdeploy
  labels:
    app: worker-service
    app.kubernetes.io/name: worker-service
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
        app.kubernetes.io/name: worker-service
    spec:
      serviceAccountName: worker-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker-service
          image: worker-service:latest
          envFrom:
            - configMapRef:
                name: worker-service-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: nexusdeploy-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - main
                - inspect
                - ping
                - -d
                - celery@$(HOSTNAME)
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 60
