# NexusDeploy – GitLab CI/CD Pipeline
# Docs: https://docs.gitlab.com/ee/ci/yaml/

# ─────────────────────────────────────────────────────────────────────────────
# Global variables
# ─────────────────────────────────────────────────────────────────────────────
variables:
  GCP_REGION: "us-central1"
  DOCKER_REGISTRY: "us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/nexusdeploy"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  TF_VERSION: "1.14.6"
  PYTHON_VERSION: "3.12"

  # Docker-in-Docker settings
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"

  # Terraform plugin cache – shared across jobs via cache key
  TF_PLUGIN_CACHE_DIR: "${CI_PROJECT_DIR}/.terraform.d/plugin-cache"

# ─────────────────────────────────────────────────────────────────────────────
# Default settings applied to all jobs
# ─────────────────────────────────────────────────────────────────────────────
default:
  image: google/cloud-sdk:alpine
  tags:
    - docker
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline stages
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - lint
  - test
  - security
  - build
  - deploy-dev
  - integration-test
  - deploy-staging
  - deploy-prod
  - notify

# ─────────────────────────────────────────────────────────────────────────────
# Reusable YAML anchors
# ─────────────────────────────────────────────────────────────────────────────
.gcp_auth: &gcp_auth
  before_script:
    - echo "${GCP_SA_KEY}" | base64 -d > /tmp/sa-key.json
    - gcloud auth activate-service-account --key-file=/tmp/sa-key.json
    - gcloud config set project "${GCP_PROJECT_ID}"
    - gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

.terraform_setup: &terraform_setup
  image: hashicorp/terraform:${TF_VERSION}
  before_script:
    - mkdir -p "${TF_PLUGIN_CACHE_DIR}"
    - echo "${GCP_SA_KEY}" | base64 -d > /tmp/sa-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

.notify_slack: &notify_slack
  after_script:
    - |
      STATUS="${CI_JOB_STATUS}"
      COLOR=$( [ "$STATUS" = "success" ] && echo "good" || echo "danger" )
      curl -s -X POST "${SLACK_WEBHOOK_URL}" \
        -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [{
            \"color\": \"${COLOR}\",
            \"title\": \"NexusDeploy GitLab CI [${STATUS}]\",
            \"text\": \"Stage: ${CI_JOB_NAME} | Branch: ${CI_COMMIT_REF_NAME} | Commit: ${CI_COMMIT_SHORT_SHA}\",
            \"footer\": \"Pipeline #${CI_PIPELINE_ID}\"
          }]
        }" || true

# ─────────────────────────────────────────────────────────────────────────────
# Cache configuration
# ─────────────────────────────────────────────────────────────────────────────
.cache_terraform:
  cache:
    key: terraform-plugins-${CI_COMMIT_REF_SLUG}
    paths:
      - .terraform.d/plugin-cache/
    policy: pull-push

.cache_pip:
  cache:
    key: pip-${PYTHON_VERSION}-${CI_COMMIT_REF_SLUG}
    paths:
      - .pip-cache/
    policy: pull-push

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: lint
# ─────────────────────────────────────────────────────────────────────────────
lint:terraform-fmt:
  stage: lint
  <<: *terraform_setup
  script:
    - terraform fmt -recursive -check terraform/
  rules:
    - changes:
        - terraform/**/*

lint:terraform-validate:
  stage: lint
  <<: *terraform_setup
  extends: .cache_terraform
  script:
    - cd terraform/environments/dev
    - terraform init -backend=false
    - terraform validate
  rules:
    - changes:
        - terraform/**/*

lint:hadolint:
  stage: lint
  image: hadolint/hadolint:latest-alpine
  script:
    - find docker/ -name 'Dockerfile*' -exec hadolint {} \;
  rules:
    - changes:
        - docker/**/*

lint:python:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  extends: .cache_pip
  script:
    - pip install --cache-dir .pip-cache flake8 black isort --quiet
    - flake8 services/ functions/ --max-line-length=120
    - black --check services/ functions/
    - isort --check-only services/ functions/
  rules:
    - changes:
        - services/**/*
        - functions/**/*

lint:yaml:
  stage: lint
  image: cytopia/yamllint:latest
  script:
    - yamllint kubernetes/ ci/
  rules:
    - changes:
        - kubernetes/**/*
        - ci/**/*

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: test
# ─────────────────────────────────────────────────────────────────────────────
test:unit:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  extends: .cache_pip
  script:
    - pip install --cache-dir .pip-cache pytest pytest-cov pytest-mock --quiet
    - pytest services/ functions/
        --cov=.
        --cov-report=xml:coverage.xml
        --cov-report=html:coverage-html
        --junit-xml=test-results.xml
        -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage-html/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: security
# ─────────────────────────────────────────────────────────────────────────────
security:trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs .
        --exit-code 1
        --severity HIGH,CRITICAL
        --format sarif
        --output trivy-fs-report.sarif
  artifacts:
    when: always
    reports:
      sast: trivy-fs-report.sarif
    paths:
      - trivy-fs-report.sarif
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

security:tfsec:
  stage: security
  image: aquasec/tfsec-ci:latest
  script:
    - tfsec terraform/ --minimum-severity HIGH --format lovely
  rules:
    - changes:
        - terraform/**/*

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: build
# ─────────────────────────────────────────────────────────────────────────────
.build_image: &build_image
  stage: build
  image: docker:29
  services:
    - name: docker:29-dind
      alias: docker
  <<: *gcp_auth
  script:
    - |
      IMAGE="${DOCKER_REGISTRY}/${SERVICE}:${IMAGE_TAG}"
      docker build \
        --build-arg BUILD_VERSION="${IMAGE_TAG}" \
        --build-arg SERVICE="${SERVICE}" \
        --cache-from "${DOCKER_REGISTRY}/${SERVICE}:latest" \
        -t "${IMAGE}" \
        -t "${DOCKER_REGISTRY}/${SERVICE}:latest" \
        "docker/${SERVICE}/"

      # Scan before pushing
      docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy:latest image \
        --exit-code 1 \
        --severity HIGH,CRITICAL \
        "${IMAGE}"

      docker push "${IMAGE}"
      docker push "${DOCKER_REGISTRY}/${SERVICE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG

build:api:
  <<: *build_image
  variables:
    SERVICE: api

build:worker:
  <<: *build_image
  variables:
    SERVICE: worker

build:scheduler:
  <<: *build_image
  variables:
    SERVICE: scheduler

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: deploy-dev
# ─────────────────────────────────────────────────────────────────────────────
deploy:dev:terraform:
  stage: deploy-dev
  <<: *terraform_setup
  <<: *gcp_auth
  extends: .cache_terraform
  script:
    - cd terraform/environments/dev
    - terraform init -backend-config=backend.hcl -reconfigure -input=false
    - terraform plan -var-file=terraform.tfvars -out=dev.tfplan -input=false
    - terraform apply -input=false dev.tfplan
    - terraform output -json > ../../../tf-outputs-dev.json
  artifacts:
    paths:
      - tf-outputs-dev.json
    expire_in: 1 hour
  environment:
    name: dev
    url: https://api.dev.nexusdeploy.example.com
    auto_stop_in: 3 days
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

deploy:dev:gke:
  stage: deploy-dev
  <<: *gcp_auth
  script:
    - gcloud container clusters get-credentials nexusdeploy-dev --region=${GCP_REGION}
    - |
      find kubernetes/ -name '*.yaml' -o -name '*.yml' | \
      xargs grep -l 'IMAGE_TAG_PLACEHOLDER' | \
      xargs sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" || true
    - kubectl apply -f kubernetes/ -n dev --recursive
    - kubectl rollout status deployment/nexusdeploy-api -n dev --timeout=5m
  environment:
    name: dev
    url: https://api.dev.nexusdeploy.example.com
  needs:
    - deploy:dev:terraform
    - build:api
    - build:worker
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: integration-test
# ─────────────────────────────────────────────────────────────────────────────
test:integration:dev:
  stage: integration-test
  image: python:${PYTHON_VERSION}-slim
  extends: .cache_pip
  script:
    - pip install --cache-dir .pip-cache pytest requests --quiet
    - |
      BASE_URL=$(cat tf-outputs-dev.json | python3 -c "import sys,json; print(json.load(sys.stdin)['cloud_run_url']['value'])")
      export BASE_URL
    - |
      for i in $(seq 1 10); do
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${BASE_URL}/health")
        [ "$STATUS" = "200" ] && echo "Health OK" && break
        echo "Attempt $i: $STATUS – waiting..."
        sleep 15
      done
    - BASE_URL="${BASE_URL}" pytest tests/integration/ --junit-xml=integration-results.xml -v
  artifacts:
    when: always
    reports:
      junit: integration-results.xml
    expire_in: 7 days
  needs:
    - deploy:dev:gke
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: deploy-staging
# ─────────────────────────────────────────────────────────────────────────────
deploy:staging:terraform:
  stage: deploy-staging
  <<: *terraform_setup
  <<: *gcp_auth
  extends: .cache_terraform
  script:
    - cd terraform/environments/staging
    - terraform init -backend-config=backend.hcl -reconfigure -input=false
    - terraform plan -var-file=terraform.tfvars -out=staging.tfplan -input=false
    - terraform apply -input=false staging.tfplan
    - terraform output -json > ../../../tf-outputs-staging.json
  artifacts:
    paths:
      - tf-outputs-staging.json
    expire_in: 1 hour
  environment:
    name: staging
    url: https://api.staging.nexusdeploy.example.com
    auto_stop_in: 7 days
  needs:
    - test:integration:dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:staging:gke:
  stage: deploy-staging
  <<: *gcp_auth
  script:
    - gcloud container clusters get-credentials nexusdeploy-staging --region=${GCP_REGION}
    - |
      find kubernetes/ -name '*.yaml' -o -name '*.yml' | \
      xargs grep -l 'IMAGE_TAG_PLACEHOLDER' | \
      xargs sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" || true
    - kubectl apply -f kubernetes/ -n staging --recursive
    - kubectl rollout status deployment/nexusdeploy-api -n staging --timeout=10m
    - sleep 30
    - |
      STAGING_URL=$(cat tf-outputs-staging.json | python3 -c "import sys,json; print(json.load(sys.stdin)['cloud_run_url']['value'])")
      curl -f "${STAGING_URL}/health" || exit 1
      echo "Staging smoke test passed"
  environment:
    name: staging
    url: https://api.staging.nexusdeploy.example.com
  needs:
    - deploy:staging:terraform
    - build:api
    - build:worker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: deploy-prod
# ─────────────────────────────────────────────────────────────────────────────
deploy:prod:terraform:
  stage: deploy-prod
  <<: *terraform_setup
  <<: *gcp_auth
  extends: .cache_terraform
  script:
    - cd terraform/environments/prod
    - terraform init -backend-config=backend.hcl -reconfigure -input=false
    - terraform plan -var-file=terraform.tfvars -out=prod.tfplan -input=false
    - terraform show -no-color prod.tfplan
    - terraform apply -input=false prod.tfplan
    - terraform output -json > ../../../tf-outputs-prod.json
  artifacts:
    paths:
      - tf-outputs-prod.json
      - terraform/environments/prod/prod.tfplan
    expire_in: 30 days
  environment:
    name: production
    url: https://api.nexusdeploy.example.com
  needs:
    - deploy:staging:gke
  rules:
    - if: $CI_COMMIT_TAG                     # only on version tags
      when: manual                            # human approval required
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

deploy:prod:gke:
  stage: deploy-prod
  <<: *gcp_auth
  script:
    - gcloud container clusters get-credentials nexusdeploy-prod --region=${GCP_REGION}
    - |
      find kubernetes/ -name '*.yaml' -o -name '*.yml' | \
      xargs grep -l 'IMAGE_TAG_PLACEHOLDER' | \
      xargs sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" || true

    # Canary: apply canary overlay if present
    - |
      if [ -d "kubernetes/overlays/prod-canary" ]; then
        echo "Deploying canary..."
        kubectl apply --kustomize kubernetes/overlays/prod-canary -n production
        kubectl rollout status deployment/nexusdeploy-api-canary -n production --timeout=5m
        echo "Canary deployed – waiting 5 minutes before full rollout"
        sleep 300
      fi

    # Full rollout
    - kubectl apply -f kubernetes/ -n production --recursive
    - kubectl rollout status deployment/nexusdeploy-api -n production --timeout=15m

    # Post-deploy health checks
    - |
      PROD_URL=$(cat tf-outputs-prod.json | python3 -c "import sys,json; print(json.load(sys.stdin)['cloud_run_url']['value'])")
      for endpoint in /health /ready; do
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${PROD_URL}${endpoint}")
        if [ "$STATUS" != "200" ]; then
          echo "FAIL: ${endpoint} -> ${STATUS}"
          exit 1
        fi
        echo "OK: ${endpoint} -> ${STATUS}"
      done
  environment:
    name: production
    url: https://api.nexusdeploy.example.com
  needs:
    - deploy:prod:terraform
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# Rollback job – manually triggered to revert prod to the previous GKE revision
deploy:prod:rollback:
  stage: deploy-prod
  <<: *gcp_auth
  script:
    - gcloud container clusters get-credentials nexusdeploy-prod --region=${GCP_REGION}
    - |
      kubectl get deployments -n production -o name | while read dep; do
        echo "Rolling back $dep"
        kubectl rollout undo "$dep" -n production
      done
    - kubectl rollout status deployment/nexusdeploy-api -n production --timeout=5m
  environment:
    name: production
    action: stop
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: notify
# ─────────────────────────────────────────────────────────────────────────────
notify:success:
  stage: notify
  image: alpine:latest
  when: on_success
  script:
    - apk add --no-cache curl --quiet
    - |
      curl -s -X POST "${SLACK_WEBHOOK_URL}" \
        -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [{
            \"color\": \"good\",
            \"title\": \"NexusDeploy – Pipeline Succeeded\",
            \"text\": \"Branch: ${CI_COMMIT_REF_NAME} | Commit: ${CI_COMMIT_SHORT_SHA} | Author: ${GITLAB_USER_NAME}\",
            \"footer\": \"GitLab Pipeline #${CI_PIPELINE_ID}\"
          }]
        }" || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

notify:failure:
  stage: notify
  image: alpine:latest
  when: on_failure
  script:
    - apk add --no-cache curl --quiet
    - |
      curl -s -X POST "${SLACK_WEBHOOK_URL}" \
        -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [{
            \"color\": \"danger\",
            \"title\": \"NexusDeploy – Pipeline FAILED\",
            \"text\": \"Branch: ${CI_COMMIT_REF_NAME} | Job: ${CI_JOB_NAME} | Commit: ${CI_COMMIT_SHORT_SHA}\",
            \"footer\": \"GitLab Pipeline #${CI_PIPELINE_ID} | View: ${CI_PIPELINE_URL}\"
          }]
        }" || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
